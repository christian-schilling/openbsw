name: Code format check

on: [ merge_group, push, pull_request ]

jobs:
  treefmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

     - name: Build the docker image
       run: |
          docker build -t fmt docker/fmt

     - name: Run the treefmt inside the docker container
       run: |
          docker run --rm -v "$PWD:/home/jenkins" -w /home/jenkins --user $(id -u):4996 fmt treefmt --ci
